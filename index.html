<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ─────────────────────────────────────── -->
    <title>Axon AI — Next-Gen Automation Platform</title>
    <meta
      name="description"
      content="Axon AI is the AI-native automation platform built for teams that move fast. Visual pipeline builder, on-device AI inference, real-time data sync, and enterprise-grade security — all in one platform."
    />
    <meta name="keywords" content="AI automation, data pipeline, workflow automation, LLM, AI platform, SaaS, enterprise automation" />
    <meta name="author" content="Axon AI, Inc." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://axon.ai/" />

    <!-- ── Open Graph ──────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://axon.ai/" />
    <meta property="og:title"       content="Axon AI — Next-Gen Automation Platform" />
    <meta property="og:description" content="The AI-native automation platform built for teams that move fast and break nothing. Visual pipelines, AI inference, real-time sync." />
    <meta property="og:image"       content="https://axon.ai/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Axon AI platform dashboard preview" />
    <meta property="og:site_name"   content="Axon AI" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter / X Card ────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@axon_ai" />
    <meta name="twitter:creator"     content="@axon_ai" />
    <meta name="twitter:title"       content="Axon AI — Next-Gen Automation Platform" />
    <meta name="twitter:description" content="Visual pipelines, on-device AI inference, and enterprise-grade security — built for teams that move fast." />
    <meta name="twitter:image"       content="https://axon.ai/og-image.png" />
    <meta name="twitter:image:alt"   content="Axon AI platform dashboard preview" />

    <!-- ── Theme & App ─────────────────────────────────────── -->
    <meta name="theme-color" content="#172B36" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="Axon AI" />

    <!-- ── Favicon ─────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── Font Preconnect (performance) ───────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Structured Data (JSON-LD) ───────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Axon AI",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI-native data automation platform with visual pipeline builder, on-device AI inference, and enterprise-grade security.",
      "url": "https://axon.ai/",
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "USD",
        "lowPrice": "12",
        "highPrice": "159",
        "offerCount": "3"
      },
      "provider": {
        "@type": "Organization",
        "name": "Axon AI, Inc.",
        "url": "https://axon.ai/"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
